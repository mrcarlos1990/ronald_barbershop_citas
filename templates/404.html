{% extends "base.html" %}

{% block title %}Página no encontrada{% endblock %}

{% block content %}
<section class="error-state">
    <div class="container narrow">
        <span class="eyebrow">404</span>
        <h1>Esa página no existe</h1>
        <p>El enlace que intentaste abrir no está disponible. Puedes volver al inicio o reservar una cita nueva.</p>
        <div class="hero-actions">
            <a class="btn btn-primary" href="{{ url_for('main.landing') }}">Volver al inicio</a>
            <a class="btn btn-secondary" href="{{ url_for('main.booking_form') }}">Agendar cita</a>
        </div>
    </div>
</section>
{% endblock %}
